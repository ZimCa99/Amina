<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Naš Chat ❤️</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }

    .box {
      width: 300px;
      margin: 50px auto;
      padding: 20px;
      background: #222;
      border-radius: 10px;
    }

    input, button {
      width: 90%;
      padding: 10px;
      margin: 5px;
      border-radius: 5px;
      border: none;
    }

    button {
      background: #ff4d6d;
      color: white;
      cursor: pointer;
    }

    #chat {
      height: 300px;
      overflow-y: scroll;
      background: #000;
      padding: 10px;
      margin-top: 10px;
      text-align: left;
    }

    .msg {
      margin: 5px 0;
    }
  </style>
</head>

<body>

<div class="box" id="loginBox">
  <h2>Login ❤️</h2>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Uloguj se</button>
</div>

<div class="box" id="chatBox" style="display:none;">
  <h2>Naš Chat ❤️</h2>

  <div id="chat"></div>

  <input id="message" placeholder="Poruka">
  <button onclick="sendMessage()">Pošalji</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔥 UBACI SVOJ CONFIG OVDE
const firebaseConfig = {
  apiKey: "AIzaSyCQsgFOR4maEw30ObQ-hAza5SxPdGx_lDY",
  authDomain: "amina-84d43.firebaseapp.com",
  projectId: "amina-84d43",
  storageBucket: "amina-84d43.firebasestorage.app",
  messagingSenderId: "137838164245",
  appId: "1:137838164245:web:9ea2a5f56614416f21d11c",
  measurementId: "G-NLQQC1K5Z7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentUser = "";

// 👤 SAMO VAS DVOJE
const users = [
  { username: "ti", password: "123" },
  { username: "ona", password: "456" }
];

// LOGIN
window.login = function () {
  const u = document.getElementById("username").value;
  const p = document.getElementById("password").value;

  const valid = users.find(x => x.username === u && x.password === p);

  if(valid){
    currentUser = u;
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("chatBox").style.display = "block";
    loadMessages();
  } else {
    alert("Pogrešan login 😢");
  }
}

// SLANJE PORUKE
window.sendMessage = async function () {
  const msg = document.getElementById("message").value;

  if(msg.trim() === "") return;

  await addDoc(collection(db, "messages"), {
    user: currentUser,
    text: msg,
    time: Date.now()
  });

  document.getElementById("message").value = "";
}

// UCITAVANJE PORUKA
function loadMessages() {
  const q = query(collection(db, "messages"), orderBy("time"));

  onSnapshot(q, (snapshot) => {
    const chat = document.getElementById("chat");
    chat.innerHTML = "";

    snapshot.forEach(doc => {
      const d = doc.data();
      chat.innerHTML += `
        <div class="msg"><b>${d.user}:</b> ${d.text}</div>
      `;
    });

    chat.scrollTop = chat.scrollHeight;
  });
}
</script>

</body>
</html>
